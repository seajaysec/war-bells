name: CI

# Safety net: prove every code change still cross-compiles for the Move (aarch64),
# builds the WASM engine, and passes the host test suite. Docs/markdown-only changes
# are skipped (they can't break the build). Releases are cut separately by pushing a
# v* tag — see release.yml.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'research/**'
      - 'LICENSE'
      - 'THIRD_PARTY.md'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'research/**'
      - 'LICENSE'
      - 'THIRD_PARTY.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Do NOT install gcc-aarch64-linux-gnu on the runner (glibc 2.39). It would
      # auto-vectorize libm into libmvec/GLIBC_2.39 calls the Move (glibc 2.35) can't
      # dlopen. build.sh cross-compiles in the pinned Docker image (glibc 2.36) when no
      # host cross-gcc is present, and its ABI gate fails on any glibc>2.35 / libmvec dep.

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v16

      - name: Host tests (DSP + preset parity + stress audit)
        run: bash scripts/run_tests.sh

      - name: Build WASM engine + single-file web app
        run: bash wasm/build_wasm.sh

      - name: Cross-compile war_bells.so + pack module tarball
        run: bash scripts/build.sh

      # Publish the CI-built tarball as a run artifact so it can be installed on a real Move for
      # on-device validation BEFORE cutting a release / submitting to the catalog. This is the binary
      # GitHub Actions actually produced (pinned-Docker toolchain) — the thing to trust, not a local build.
      - name: Upload module tarball (test the CI build on-device)
        uses: actions/upload-artifact@v4
        with:
          name: war_bells-module
          path: dist/war_bells-module.tar.gz
          if-no-files-found: error
